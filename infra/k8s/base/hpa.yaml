apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neofilm-api-hpa
  namespace: neofilm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neofilm-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neofilm-web-admin-hpa
  namespace: neofilm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neofilm-web-admin
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
